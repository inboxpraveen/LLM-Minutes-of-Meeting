<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — MoM AI</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','ui-sans-serif','system-ui','-apple-system','sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
</head>

<body class="h-full font-sans antialiased bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-2xl shadow-lg mb-4">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">MoM AI</h1>
      <p class="text-sm text-gray-500 mt-1">AI-powered Minutes of Meeting</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
      <h2 class="text-xl font-semibold text-gray-900 mb-6">Welcome back</h2>

      <!-- Flash messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="mb-4 px-4 py-3 rounded-lg text-sm
            {% if category == 'error' %}bg-red-50 text-red-700 border border-red-200
            {% elif category == 'success' %}bg-green-50 text-green-700 border border-green-200
            {% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
          <input type="text" id="username" name="username" required autocomplete="username"
            class="input-field" placeholder="Enter your username" />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password"
            class="input-field" placeholder="Enter your password" />
        </div>

        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="remember" class="w-4 h-4 text-indigo-600 rounded border-gray-300" />
            <span class="text-sm text-gray-600">Remember me</span>
          </label>
        </div>

        <button type="submit" class="btn-primary w-full">
          Sign in
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      Contact your administrator to create an account.
    </p>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
